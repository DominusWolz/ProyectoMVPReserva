<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración | Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5; /* Azul índigo moderno */
            --primary-hover: #4338CA;
            --danger-color: #EF4444;
            --danger-hover: #DC2626;
            --warning-color: #F59E0B;
            --warning-hover: #D97706;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar / Menú lateral simulado */
        .sidebar {
            width: 260px;
            background-color: var(--card-bg);
            border-right: 1px solid var(--border-color);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar-logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-menu-item {
            padding: 12px 16px;
            background-color: #EEF2FF;
            color: var(--primary-color);
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Contenido Principal */
        .main-content {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
        }

        .header-title {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header-subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        /* Tarjeta del Formulario */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            padding: 24px;
            margin-bottom: 32px;
            border: 1px solid var(--border-color);
        }

        .card h3 {
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: var(--text-main);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            align-items: end;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input {
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-secondary { background-color: #F3F4F6; color: var(--text-main); border: 1px solid var(--border-color); }
        .btn-secondary:hover { background-color: #E5E7EB; }
        
        .btn-warning { background-color: #FEF3C7; color: var(--warning-hover); border: 1px solid #FDE68A; padding: 6px 12px; font-size: 0.85rem;}
        .btn-warning:hover { background-color: #FDE68A; }
        
        .btn-danger { background-color: #FEE2E2; color: var(--danger-hover); border: 1px solid #FECACA; padding: 6px 12px; font-size: 0.85rem;}
        .btn-danger:hover { background-color: #FECACA; }

        .form-actions {
            display: flex;
            gap: 12px;
        }

        /* Tabla de Datos */
        .table-container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #F9FAFB;
            padding: 14px 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #F9FAFB;
        }

        .badge {
            background-color: #EEF2FF;
            color: var(--primary-color);
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .price-text {
            font-weight: 600;
            color: var(--text-main);
        }
        
        .actions-cell {
            display: flex;
            gap: 8px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo">
            📅 Disponibilidades
        </div>
        <div class="sidebar-menu-item">
            📋 Servicios
        </div>
        </aside>

    <main class="main-content">
        <h1 class="header-title">Catálogo de Servicios</h1>
        <p class="header-subtitle">Gestiona las opciones reservables de tu restaurante.</p>
        
        <div class="card">
            <h3 id="form-title">✨ Crear Nuevo Servicio</h3>
            <div class="form-grid">
                <input type="hidden" id="servicio-id">
                
                <div class="input-group">
                    <label for="nombre">Nombre del servicio</label>
                    <input type="text" id="nombre" placeholder="Ej. Cena VIP">
                </div>
                
                <div class="input-group">
                    <label for="duracion">Duración (minutos)</label>
                    <input type="number" id="duracion" placeholder="Ej. 120">
                </div>
                
                <div class="input-group">
                    <label for="precio">Precio base ($)</label>
                    <input type="number" id="precio" placeholder="Ej. 15000">
                </div>

                <div class="form-actions">
                    <button id="btn-guardar" class="btn btn-primary" onclick="guardarServicio()">
                        Guardar
                    </button>
                    <button id="btn-cancelar" class="btn btn-secondary" style="display:none;" onclick="cancelarEdicion()">
                        Cancelar
                    </button>
                </div>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Servicio</th>
                        <th>Tiempo Estimado</th>
                        <th>Costo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-servicios">
                    </tbody>
            </table>
        </div>
    </main>

    <script>
        const API_URL = 'http://localhost:3000/api/servicios';

        async function cargarServicios() {
            try {
                const res = await fetch(API_URL);
                const servicios = await res.json();
                const tbody = document.getElementById('tabla-servicios');
                tbody.innerHTML = '';
                
                servicios.forEach(s => {
                    tbody.innerHTML += `
                        <tr>
                            <td style="color: var(--text-muted);">#${s.id}</td>
                            <td style="font-weight: 500;">${s.nombre}</td>
                            <td><span class="badge">⏱ ${s.duracion} min</span></td>
                            <td class="price-text">$${s.precio}</td>
                            <td class="actions-cell">
                                <button class="btn btn-warning" onclick="prepararEdicion(${s.id}, '${s.nombre}', ${s.duracion}, ${s.precio})">✎ Editar</button>
                                <button class="btn btn-danger" onclick="eliminarServicio(${s.id})">✖ Borrar</button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("Error al conectar con el backend:", error);
            }
        }

        async function guardarServicio() {
            const id = document.getElementById('servicio-id').value;
            const nombre = document.getElementById('nombre').value;
            const duracion = document.getElementById('duracion').value;
            const precio = document.getElementById('precio').value;

            if(!nombre || !duracion || !precio) return alert("Por favor, llena todos los campos");

            const datos = { nombre, duracion: parseInt(duracion), precio: parseFloat(precio) };

            if (id) {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
            } else {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });
            }
            
            cancelarEdicion();
            cargarServicios(); 
        }

        function prepararEdicion(id, nombre, duracion, precio) {
            document.getElementById('servicio-id').value = id;
            document.getElementById('nombre').value = nombre;
            document.getElementById('duracion').value = duracion;
            document.getElementById('precio').value = precio;
            
            document.getElementById('form-title').innerText = "✏️ Editar Servicio #" + id;
            document.getElementById('btn-guardar').innerText = "Actualizar";
            document.getElementById('btn-cancelar').style.display = "inline-flex";
        }

        function cancelarEdicion() {
            document.getElementById('servicio-id').value = '';
            document.getElementById('nombre').value = '';
            document.getElementById('duracion').value = '';
            document.getElementById('precio').value = '';
            
            document.getElementById('form-title').innerText = "✨ Crear Nuevo Servicio";
            document.getElementById('btn-guardar').innerText = "Guardar";
            document.getElementById('btn-cancelar').style.display = "none";
        }

        async function eliminarServicio(id) {
            if(confirm('¿Estás seguro de que deseas eliminar este servicio?')) {
                const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                if(!res.ok) {
                    const error = await res.json();
                    alert(error.error);
                }
                cargarServicios();
            }
        }

        cargarServicios();
    </script>
</body>
</html>
